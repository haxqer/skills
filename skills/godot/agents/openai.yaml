interface:
  display_name: "Godot"
  short_description: "Edit scenes, integrate art plus project-native music/story content and frame animations, validate runtime changes, export builds, and repair Godot UIDs"
  default_prompt: "Use $godot to inspect a Godot project, batch-edit scenes and UI, add art, integrate provided or separately generated music and story content through the project's existing flows, default to a pixel-art direction when the user does not specify a style and the project has no established one, prefer transparent generated sprite assets and fall back to a pure-green chroma-key cutout workflow when needed, write repaired frames back into the project before building AnimatedSprite2D animations, run the game to validate implemented features when possible, export builds from existing presets, create mesh libraries, or repair missing UID metadata."
